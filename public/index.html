<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0e27"/>
<title>🃏 UNO</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="/socket.io/socket.io.js"></script>
<style>
/* ══════════════════════════════════════════════════════════════════════════
   RESET & ROOT VARIABLES
══════════════════════════════════════════════════════════════════════════ */
:root {
  --bg-dark:     #0a0e27;
  --bg-card:     #141b3d;
  --bg-table:    #1a2847;
  --text-light:  #e8ecf8;
  --text-muted:  #7a86b6;
  --border:      rgba(255,255,255,.12);
  --radius:      16px;
  --safe-b:      env(safe-area-inset-bottom, 0px);

  /* UNO Card Colors */
  --red:         #e63946;
  --yellow:      #ffd60a;
  --green:       #06ffa5;
  --blue:        #3a86ff;
  --wild-dark:   #1e1e30;
  --wild-glow:   #a855f7;

  /* Glow Effects */
  --red-glow:    rgba(230,57,70,.6);
  --yellow-glow: rgba(255,214,10,.6);
  --green-glow:  rgba(6,255,165,.6);
  --blue-glow:   rgba(58,134,255,.6);
  --wild-glow:   rgba(168,85,247,.6);
}

*,*::before,*::after {
  margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body {
  height:100%; height:100dvh; overflow:hidden;
  background:var(--bg-dark);
  font-family:'Poppins',sans-serif;
  color:var(--text-light);
  user-select:none; -webkit-user-select:none;
}

/* ══════════════════════════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════════════════════════ */
#loginScreen {
  position:fixed; inset:0; z-index:999;
  background:
    radial-gradient(circle at 30% 30%, rgba(58,134,255,.15) 0%, transparent 50%),
    radial-gradient(circle at 70% 70%, rgba(230,57,70,.12) 0%, transparent 50%),
    linear-gradient(135deg, #0a0e27 0%, #141b3d 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px;
  transition:opacity .5s cubic-bezier(.4,0,.2,1), transform .5s cubic-bezier(.4,0,.2,1);
}
#loginScreen.hide {
  opacity:0; pointer-events:none; transform:scale(1.08);
}

/* Animated Card Stack */
.login-cards {
  display:flex; gap:0; margin-bottom:32px; position:relative;
  filter:drop-shadow(0 20px 60px rgba(0,0,0,.8));
  perspective:1000px;
}
.login-card-preview {
  width:64px; height:96px; border-radius:12px;
  border:3px solid rgba(255,255,255,.4);
  display:flex; align-items:center; justify-content:center;
  font-family:'Righteous',cursive; font-size:2rem; color:#fff;
  box-shadow:
    0 10px 30px rgba(0,0,0,.6),
    inset 0 2px 8px rgba(255,255,255,.15);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
.login-card-preview::before {
  content:'UNO';
  position:absolute;
  top:8px; left:8px;
  font-size:.55rem;
  font-weight:900;
  opacity:.4;
}
.login-card-preview:nth-child(1) {
  background:linear-gradient(135deg, #e63946 0%, #d62839 100%);
  transform:rotate(-18deg) translateX(14px) translateY(8px);
  z-index:1;
}
.login-card-preview:nth-child(2) {
  background:linear-gradient(135deg, #3a86ff 0%, #2667d8 100%);
  transform:rotate(-6deg) translateY(-4px);
  z-index:2;
}
.login-card-preview:nth-child(3) {
  background:linear-gradient(135deg, #06ffa5 0%, #05d687 100%);
  transform:rotate(6deg) translateY(-4px);
  z-index:2;
}
.login-card-preview:nth-child(4) {
  background:linear-gradient(135deg, #ffd60a 0%, #e6c200 100%);
  transform:rotate(18deg) translateX(-14px) translateY(8px);
  z-index:1;
  color:#1e1e30;
}
.login-cards:hover .login-card-preview:nth-child(1) { transform:rotate(-22deg) translateX(18px) translateY(12px); }
.login-cards:hover .login-card-preview:nth-child(2) { transform:rotate(-8deg) translateY(-8px) scale(1.05); }
.login-cards:hover .login-card-preview:nth-child(3) { transform:rotate(8deg) translateY(-8px) scale(1.05); }
.login-cards:hover .login-card-preview:nth-child(4) { transform:rotate(22deg) translateX(-18px) translateY(12px); }

.login-title {
  font-family:'Righteous',cursive;
  font-size:clamp(3.5rem,16vw,5.5rem);
  background:linear-gradient(135deg,#e63946 0%,#ffd60a 25%,#06ffa5 50%,#3a86ff 75%,#a855f7 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; color:transparent;
  margin-bottom:8px; letter-spacing:.08em;
  filter:drop-shadow(0 4px 24px rgba(58,134,255,.4));
  animation:titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { filter:drop-shadow(0 4px 24px rgba(58,134,255,.4)); }
  50% { filter:drop-shadow(0 4px 32px rgba(230,57,70,.5)); }
}

.login-sub {
  color:var(--text-muted); font-size:1rem; font-weight:500;
  margin-bottom:42px; text-align:center;
}

.login-form {
  width:100%; max-width:420px;
  background:rgba(20,27,61,.6);
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--radius);
  padding:32px;
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.inp-wrap {
  position:relative; margin-bottom:18px;
}
.inp-wrap i {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  color:var(--text-muted); font-size:1.1rem; pointer-events:none;
  transition:color .3s;
}
.inp-wrap input {
  width:100%; padding:16px 16px 16px 48px;
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.1);
  border-radius:12px;
  color:var(--text-light);
  font-family:'Poppins';
  font-size:1rem; font-weight:600;
  outline:none;
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
.inp-wrap input:focus {
  border-color:rgba(58,134,255,.6);
  background:rgba(255,255,255,.08);
  box-shadow:0 0 0 4px rgba(58,134,255,.1);
}
.inp-wrap input:focus + i {
  color:#3a86ff;
}
.inp-wrap input::placeholder {
  color:rgba(255,255,255,.25); font-weight:400;
}

.btn-join {
  width:100%; padding:18px; border:none;
  border-radius:14px; cursor:pointer;
  background:linear-gradient(135deg,#e63946 0%,#3a86ff 50%,#06ffa5 100%);
  background-size:200% 100%;
  font-family:'Righteous',cursive;
  font-size:1.3rem; color:#fff;
  box-shadow:
    0 8px 28px rgba(58,134,255,.4),
    inset 0 2px 4px rgba(255,255,255,.2);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  letter-spacing:.06em;
  position:relative;
  overflow:hidden;
}
.btn-join::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.2), transparent);
  opacity:0;
  transition:opacity .3s;
}
.btn-join:hover {
  background-position:100% 0;
  transform:translateY(-2px);
  box-shadow:0 12px 36px rgba(58,134,255,.5);
}
.btn-join:hover::before {
  opacity:1;
}
.btn-join:active {
  transform:scale(.96);
}

/* ══════════════════════════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════════════════════════ */
#app {
  display:flex; flex-direction:column; height:100dvh;
}

/* ── TOPBAR ── */
#topbar {
  flex-shrink:0; height:64px;
  background:linear-gradient(90deg,rgba(20,27,61,.95),rgba(26,40,71,.95));
  border-bottom:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(20px);
  display:flex; align-items:center; padding:0 16px; gap:12px;
  box-shadow:0 4px 24px rgba(0,0,0,.3);
  z-index:10;
}

.topbar-title {
  font-family:'Righteous',cursive; font-size:1.8rem;
  background:linear-gradient(90deg,#e63946,#ffd60a,#06ffa5);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  flex:1;
  filter:drop-shadow(0 2px 8px rgba(58,134,255,.3));
}

.tbadge {
  padding:6px 12px; border-radius:10px;
  font-size:.8rem; font-weight:800;
  display:flex; align-items:center; gap:6px;
  white-space:nowrap; flex-shrink:0;
}
.tbadge-turn {
  background:rgba(255,214,10,.12);
  border:1px solid rgba(255,214,10,.4);
  color:#ffd60a;
  box-shadow:0 0 12px rgba(255,214,10,.2);
}
.tbadge-round {
  background:rgba(58,134,255,.12);
  border:1px solid rgba(58,134,255,.4);
  color:#79aaff;
}

.tdot {
  width:6px; height:6px; border-radius:50%;
  background:#06ffa5;
  animation:pulse 1.2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.3; transform:scale(.5); }
}

.ticon {
  width:42px; height:42px;
  border-radius:12px; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  position:relative; flex-shrink:0;
}
.ticon:active {
  transform:scale(.88);
}
.ticon.p {
  background:rgba(58,134,255,.15);
  border:1px solid rgba(58,134,255,.4);
  color:#79aaff;
}
.ticon.p:hover {
  background:rgba(58,134,255,.25);
  box-shadow:0 0 16px rgba(58,134,255,.3);
}
.ticon.c {
  background:rgba(6,255,165,.12);
  border:1px solid rgba(6,255,165,.35);
  color:#06ffa5;
}
.ticon.c:hover {
  background:rgba(6,255,165,.2);
  box-shadow:0 0 16px rgba(6,255,165,.3);
}

.unread-dot {
  position:absolute; top:-4px; right:-4px;
  width:18px; height:18px; border-radius:50%;
  background:linear-gradient(135deg,#e63946,#ff6b6b);
  font-size:.65rem; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  animation:badgePop .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 2px 8px rgba(230,57,70,.6);
}
@keyframes badgePop {
  from { transform:scale(0) rotate(180deg); }
  to { transform:scale(1) rotate(0deg); }
}

/* ── TABLE (middle area) ── */
#table {
  flex:1; position:relative; overflow:hidden;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(58,134,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(230,57,70,.06) 0%, transparent 50%),
    linear-gradient(180deg, #0a0e27 0%, #141b3d 100%);
  perspective:1200px;
}

/* Ambient lighting effect */
#table::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(58,134,255,.04) 0%, transparent 70%),
    radial-gradient(ellipse at 30% 70%, rgba(6,255,165,.03) 0%, transparent 60%);
  animation:ambientPulse 8s ease-in-out infinite;
}
@keyframes ambientPulse {
  0%,100% { opacity:.6; }
  50% { opacity:1; }
}

/* Opponents area */
#opponents {
  position:absolute; top:0; left:0; right:0;
  display:flex; flex-wrap:nowrap; gap:12px;
  padding:14px 16px;
  overflow-x:auto; scrollbar-width:none;
  justify-content:center;
}
#opponents::-webkit-scrollbar { display:none; }

.opponent-slot {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  flex-shrink:0; min-width:72px;
}

.opp-avatar {
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:1.1rem; color:#fff;
  border:3px solid rgba(255,255,255,.2);
  box-shadow:
    0 4px 12px rgba(0,0,0,.5),
    inset 0 2px 6px rgba(255,255,255,.1);
  position:relative;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.opp-avatar.active-turn {
  border-color:#ffd60a;
  box-shadow:
    0 0 0 4px rgba(255,214,10,.25),
    0 6px 20px rgba(255,214,10,.5),
    inset 0 2px 6px rgba(255,255,255,.2);
  animation:avatarPulse 1.2s ease infinite;
  transform:scale(1.05);
}
@keyframes avatarPulse {
  0%,100% {
    box-shadow:
      0 0 0 4px rgba(255,214,10,.25),
      0 6px 20px rgba(255,214,10,.5);
  }
  50% {
    box-shadow:
      0 0 0 6px rgba(255,214,10,.15),
      0 8px 28px rgba(255,214,10,.6);
  }
}

.opp-name {
  font-size:.7rem; font-weight:700;
  color:var(--text-muted); text-align:center;
  max-width:72px; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap;
}

.opp-cards {
  display:flex; gap:3px;
}

.opp-card-back {
  width:16px; height:24px; border-radius:4px;
  background:linear-gradient(135deg,#1a2847,#0f1730);
  border:1px solid rgba(255,255,255,.2);
  box-shadow:
    2px 2px 6px rgba(0,0,0,.5),
    inset 0 1px 2px rgba(255,255,255,.1);
  position:relative;
  transition:transform .2s;
}
.opp-card-back:hover {
  transform:translateY(-2px);
}

.opp-count {
  font-size:.7rem; font-weight:800;
  padding:3px 10px; border-radius:8px;
  background:rgba(255,255,255,.08);
  color:var(--text-muted);
}

.uno-badge {
  position:absolute; top:-8px; right:-8px;
  background:linear-gradient(135deg,#e63946,#ff6b6b);
  color:#fff; font-size:.6rem; font-weight:900;
  padding:2px 6px; border-radius:8px;
  border:2px solid rgba(255,255,255,.4);
  animation:unoBadge .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 2px 8px rgba(230,57,70,.6);
}
@keyframes unoBadge {
  from { transform:scale(0) rotate(-180deg); }
  to { transform:scale(1) rotate(0deg); }
}

/* Center play area */
#playArea {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  display:flex; align-items:center; justify-content:center; gap:32px;
}

/* Deck pile */
.deck-pile {
  position:relative;
  width:100px; height:140px;
  cursor:pointer;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  transform-style:preserve-3d;
}
.deck-pile:hover {
  transform:translateY(-8px) scale(1.02);
}
.deck-pile:active {
  transform:scale(.96);
}

.deck-card {
  position:absolute; inset:0;
  border-radius:12px;
  background:linear-gradient(135deg,#1a2847,#0f1730);
  border:3px solid rgba(255,255,255,.3);
  box-shadow:
    0 10px 40px rgba(0,0,0,.6),
    inset 0 2px 8px rgba(255,255,255,.15);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition:transform .2s;
}
.deck-card:nth-child(1) { transform:translate(-2px,-2px) rotate(-1deg); }
.deck-card:nth-child(2) { transform:translate(-1px,-1px) rotate(0.5deg); }
.deck-card:nth-child(3) { transform:translate(0,0); z-index:1; }

.deck-icon {
  font-size:2.5rem; color:rgba(255,255,255,.3);
  margin-bottom:8px;
}
.deck-count {
  font-size:.8rem; font-weight:700;
  color:rgba(255,255,255,.4);
}

/* Discard pile with 3D effect */
.discard-pile {
  position:relative;
  width:100px; height:140px;
  transform-style:preserve-3d;
}

/* UNO Card Styles with 3D */
.uno-card {
  width:100%; height:100%;
  border-radius:12px;
  position:relative;
  cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  transform-style:preserve-3d;
  box-shadow:0 10px 40px rgba(0,0,0,.6);
}

.uno-card::before {
  content:''; position:absolute; inset:-4px;
  border-radius:14px; opacity:0;
  transition:opacity .3s;
  z-index:-1;
}

/* Card color backgrounds */
.card-red {
  background:linear-gradient(135deg,#e63946 0%,#d62839 100%);
}
.card-red::before {
  background:radial-gradient(circle at 50% 50%, var(--red-glow), transparent 70%);
}

.card-yellow {
  background:linear-gradient(135deg,#ffd60a 0%,#e6c200 100%);
}
.card-yellow::before {
  background:radial-gradient(circle at 50% 50%, var(--yellow-glow), transparent 70%);
}

.card-green {
  background:linear-gradient(135deg,#06ffa5 0%,#05d687 100%);
}
.card-green::before {
  background:radial-gradient(circle at 50% 50%, var(--green-glow), transparent 70%);
}

.card-blue {
  background:linear-gradient(135deg,#3a86ff 0%,#2667d8 100%);
}
.card-blue::before {
  background:radial-gradient(circle at 50% 50%, var(--blue-glow), transparent 70%);
}

.card-wild {
  background:
    linear-gradient(135deg, #a855f7 0%, #7c3aed 50%, #6366f1 100%);
}
.card-wild::before {
  background:radial-gradient(circle at 50% 50%, var(--wild-glow), transparent 70%);
}

/* Card face */
.card-face {
  width:100%; height:100%;
  border-radius:12px;
  border:3px solid rgba(255,255,255,.4);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative;
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,.2),
    inset 0 -2px 8px rgba(0,0,0,.2);
  background:inherit;
}

.card-corner {
  position:absolute;
  font-family:'Righteous',cursive;
  font-size:.9rem; font-weight:900;
  color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.3);
}
.card-corner.tl { top:8px; left:8px; }
.card-corner.br { bottom:8px; right:8px; transform:rotate(180deg); }

.card-center {
  font-family:'Righteous',cursive;
  font-size:2.5rem; font-weight:900;
  color:#fff;
  text-shadow:
    0 3px 8px rgba(0,0,0,.4),
    0 0 20px rgba(255,255,255,.2);
}
.card-center.big {
  font-size:3rem;
}

/* Card states in hand */
.uno-card.playable {
  cursor:pointer;
}
.uno-card.playable:hover {
  transform:translateY(-16px) scale(1.05);
  box-shadow:0 16px 60px rgba(0,0,0,.8);
}
.uno-card.playable:hover::before {
  opacity:1;
}

.uno-card.unplayable {
  opacity:.5;
  cursor:not-allowed;
  filter:grayscale(.4);
}

.uno-card.selected {
  transform:translateY(-24px) scale(1.1) rotateY(5deg);
  box-shadow:0 20px 70px rgba(0,0,0,.9);
}
.uno-card.selected::before {
  opacity:1;
}

/* Bottom hand area */
#handArea {
  position:absolute; bottom:0; left:0; right:0;
  padding:16px 16px calc(var(--safe-b) + 16px);
  display:flex; justify-content:center;
  pointer-events:none;
}

#handCards {
  display:flex; gap:0;
  pointer-events:auto;
  max-width:100%;
  overflow-x:auto;
  scrollbar-width:none;
  padding:0 8px;
}
#handCards::-webkit-scrollbar { display:none; }

/* Cards in hand overlap */
#handCards .uno-card {
  width:70px; height:98px;
  margin-left:-36px;
  flex-shrink:0;
}
#handCards .uno-card:first-child {
  margin-left:0;
}

/* Wider layout for larger screens */
@media (min-width: 600px) {
  #handCards .uno-card {
    width:90px; height:126px;
    margin-left:-48px;
  }
  .deck-pile, .discard-pile {
    width:120px; height:168px;
  }
}

/* UNO Button */
.uno-call-btn {
  position:absolute; bottom:120px; right:20px;
  padding:14px 28px; border:none; border-radius:50px;
  background:linear-gradient(135deg,#e63946,#ff6b6b);
  color:#fff; font-family:'Righteous',cursive;
  font-size:1.3rem; font-weight:900;
  cursor:pointer;
  box-shadow:0 8px 28px rgba(230,57,70,.5);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  animation:unoButtonPulse 2s ease-in-out infinite;
  z-index:5;
  letter-spacing:.06em;
}
@keyframes unoButtonPulse {
  0%,100% {
    box-shadow:0 8px 28px rgba(230,57,70,.5);
    transform:scale(1);
  }
  50% {
    box-shadow:0 12px 40px rgba(230,57,70,.7);
    transform:scale(1.05);
  }
}
.uno-call-btn:active {
  transform:scale(.92);
}

/* ══════════════════════════════════════════════════════════════════════════
   SHEETS / OVERLAYS
══════════════════════════════════════════════════════════════════════════ */
.sheet {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(10px);
  display:flex; align-items:flex-end;
  opacity:0; pointer-events:none;
  transition:opacity .4s cubic-bezier(.4,0,.2,1);
}
.sheet.show {
  opacity:1; pointer-events:auto;
}

.sheet-content {

<body>

     LOGIN SCREEN

<!-- ══════════════════════════════════════════════════════════════════════════
     SHEETS
══════════════════════════════════════════════════════════════════════════ -->

<script>
/* ══════════════════════════════════════════════════════════════════════════
   GLOBALS
══════════════════════════════════════════════════════════════════════════ */
const SYMBOLS = {
  skip: '🚫',
  reverse: '🔄',
  draw2: '+2',
  draw4: '+4',
  wild: '🌈'
};

const COLOR_TR = {
  red: 'Kırmızı',
  yellow: 'Sarı',
  green: 'Yeşil',
  blue: 'Mavi',
  wild: 'Joker'
};

let socket;
let myId;
let myHand = [];
let roomState = null;
let selectedCardId = null;
let pendingWildId = null;
let chatOpen = false;
let unread = 0;

/* ══════════════════════════════════════════════════════════════════════════
   JOIN
══════════════════════════════════════════════════════════════════════════ */
function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  const roomId = document.getElementById('roomInput').value.trim();
  if (!name || !roomId) {
    notify('İsim ve oda kodu gerekli!', 'error');
    return;
  }

  socket = io();
  myId = null;

  socket.on('connect', () => {
    myId = socket.id;
    socket.emit('join', { name, roomId });
    document.getElementById('loginScreen').classList.add('hide');
    setTimeout(() => {
      document.getElementById('app').style.display = 'flex';
    }, 500);
  });

  socket.on('room_update', (state) => {
    roomState = state;
    renderRoom(state);
  });

  socket.on('your_hand', (hand) => {
    myHand = hand;
    renderHand();
  });

  socket.on('game_started', () => {
    notify('🎮 Oyun başladı! İyi şanslar!', 'success');
  });

  socket.on('card_played', (data) => {
    notify(`${data.name}: ${cardLabel(data.card)}`, 'info');
    renderDiscard();
  });

  socket.on('uno_alert', (data) => {
    notify(`⚡ ${data.name} UNO dedi!`, 'error');
  });

  socket.on('uno_called', (data) => {
    notify(`🔥 ${data.name}: UNO!`, 'success');
  });

  socket.on('game_over', (data) => {
    showWin(data.winner, data.winnerName, data.scores);
    spawnConfetti();
  });

  socket.on('new_round_started', (data) => {
    closeSheet('winOverlay');
    notify(`🔄 ${data.round}. tur başladı!`, 'info');
  });

  socket.on('player_drew', (data) => {
    notify(`${data.name} ${data.count} kart çekti`, 'info');
  });

  socket.on('drew_cards', (data) => {
    if (data.playable) {
      notify('Çektiğin kart oynanabilir!', 'success');
    }
  });

  socket.on('chat', (data) => {
    appendChat(data);
    if (!chatOpen && !data.system) {
      unread++;
      updateUnread();
    }
  });

  socket.on('error_msg', (msg) => {
    notify(msg, 'error');
  });
}

/* ══════════════════════════════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════════════════════════════ */
function startGame() {
  socket.emit('start_game');
}

function drawCard() {
  if (!roomState?.started) return;
  socket.emit('draw_card');
}

function playSelectedCard() {
  if (!selectedCardId) return;
  const card = myHand.find(c => c.id === selectedCardId);
  if (!card) return;

  if (card.type === 'wild') {
    pendingWildId = selectedCardId;
    openSheet('colorOverlay');
  } else {
    socket.emit('play_card', { cardId: selectedCardId });
    selectedCardId = null;
    renderHand();
  }
}

function selectColor(color) {
  if (pendingWildId !== null) {
    socket.emit('play_card', { cardId: pendingWildId, chosenColor: color });
    pendingWildId = null;
    selectedCardId = null;
  }
  closeColorPicker();
  renderHand();
}

function closeColorPicker() {
  closeSheet('colorOverlay');
}

function callUno() {
  socket.emit('call_uno');
}

function newRound() {
  socket.emit('new_round');
}

/* ══════════════════════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════════════════════ */
function renderRoom(s) {
  if (!s) return;
  renderOpponents(s);
  renderTopbar(s);
  renderPlayers(s);
  renderDiscard();
  document.getElementById('deckCount').textContent = s.deckCount || '—';
}

function renderHand() {
  const c = document.getElementById('handCards');
  c.innerHTML = '';
  if (!roomState?.started) return;

  myHand.forEach(card => {
    const playable = canPlayLocal(card);
    const selected = card.id === selectedCardId;
    const el = makeCard(card, playable, selected);
    
    el.addEventListener('click', () => {
      if (!playable) return;
      if (selectedCardId === card.id) {
        playSelectedCard();
      } else {
        selectedCardId = card.id;
        renderHand();
      }
    });
    
    c.appendChild(el);
  });
}

function renderDiscard() {
  const pile = document.getElementById('discardPile');
  pile.innerHTML = '';
  if (!roomState?.topCard) return;

  const card = { ...roomState.topCard };
  if (roomState.activeColor && card.type === 'wild') {
    card.displayColor = roomState.activeColor;
  }
  
  const el = makeCard(card, false, false);
  pile.appendChild(el);
}

function canPlayLocal(card) {
  if (!roomState) return false;
  const isTurn = roomState.order[roomState.turnIdx] === myId;
  if (!isTurn) return false;

  const { topCard, activeColor, drawStack } = roomState;
  if (drawStack > 0) {
    if (topCard.value === 'draw2') return card.value === 'draw2';
    if (topCard.value === 'draw4') return card.value === 'draw4';
  }
  if (card.type === 'wild') return true;
  return card.color === activeColor || card.value === topCard.value;
}

function renderOpponents(s) {
  const c = document.getElementById('opponents');
  c.innerHTML = '';
  
  s.order.forEach(pid => {
    if (pid === myId) return;
    const p = s.players[pid];
    if (!p) return;
    
    const isActive = s.order[s.turnIdx] === pid;
    const handCount = p.handCount || 0;
    
    const slot = document.createElement('div');
    slot.className = 'opponent-slot';
    
    let cardsHtml = '';
    if (handCount <= 5) {
      for (let i = 0; i < handCount; i++) {
        cardsHtml += '<div class="opp-card-back"></div>';
      }
    }
    
    slot.innerHTML = `
      <div class="opp-avatar${isActive ? ' active-turn' : ''}" style="background:${p.color}">
        ${p.name.charAt(0).toUpperCase()}
        ${handCount === 1 ? '<div class="uno-badge">UNO</div>' : ''}
      </div>
      <div class="opp-name">${p.name}</div>
      <div class="opp-cards">${cardsHtml}</div>
      <div class="opp-count">${handCount} kart</div>`;
    
    c.appendChild(slot);
  });
}

function renderTopbar(s) {
  const cur = s.players[s.order[s.turnIdx]];
  document.getElementById('turnName').textContent = cur
    ? (s.order[s.turnIdx] === myId ? 'Sen!' : cur.name)
    : '—';
  document.getElementById('roundBadge').innerHTML = `<i class="fas fa-layer-group"></i> T${s.round}`;
}

function renderPlayers(s) {
  const c = document.getElementById('playersContainer');
  c.innerHTML = '';
  
  const sorted = [...s.order].sort((a, b) => (s.scores[b] || 0) - (s.scores[a] || 0));
  sorted.forEach(pid => {
    const p = s.players[pid];
    if (!p) return;
    
    const isActive = s.order[s.turnIdx] === pid;
    const item = document.createElement('div');
    item.className = 'p-item' + (isActive ? ' active-p' : '') + (pid === myId ? ' me-p' : '');
    
    item.innerHTML = `
      <div class="p-av" style="background:${p.color}">${p.name.charAt(0).toUpperCase()}</div>
      <div class="p-info">
        <div class="p-name">${p.name}${pid === myId ? ' <span style="color:#79aaff;font-size:.75rem">(Sen)</span>' : ''}</div>
        <div class="p-sub">Skor: ${s.scores[pid] || 0} puan</div>
      </div>
      ${isActive ? '<i class="fas fa-crown" style="color:#ffd60a;font-size:1rem"></i>' : ''}
      <div class="p-pill"><i class="fas fa-layer-group"></i> ${p.handCount}</div>`;
    
    c.appendChild(item);
  });
}

/* ══════════════════════════════════════════════════════════════════════════
   MAKE CARD
══════════════════════════════════════════════════════════════════════════ */
function makeCard(card, playable, selected) {
  const wrap = document.createElement('div');
  const colorClass = card.displayColor
    ? `card-${card.displayColor}`
    : `card-${card.color}`;
  
  wrap.className = `uno-card ${colorClass}`;
  wrap.dataset.id = card.id;
  
  if (playable) wrap.classList.add('playable');
  if (selected) wrap.classList.add('selected');
  if (!playable && card.id !== undefined) wrap.classList.add('unplayable');

  const face = document.createElement('div');
  face.className = 'card-face';

  const label = SYMBOLS[card.value] || card.value;
  const isSpecial = !!SYMBOLS[card.value];

  face.innerHTML = `
    <div class="card-corner tl">${label}</div>
    <div class="card-center ${isSpecial ? 'big' : ''}">${label}</div>
    <div class="card-corner br">${label}</div>`;

  wrap.appendChild(face);
  return wrap;
}

function cardLabel(card) {
  const c = COLOR_TR[card.color] || card.color;
  const v = SYMBOLS[card.value] || card.value;
  return `${c} ${v}`;
}

/* ══════════════════════════════════════════════════════════════════════════
   CHAT
══════════════════════════════════════════════════════════════════════════ */
function openChat() {
  openSheet('chatOverlay');
  chatOpen = true;
  unread = 0;
  updateUnread();
  setTimeout(() => {
    const m = document.getElementById('chatMessages');
    m.scrollTop = m.scrollHeight;
  }, 100);
}

function sendChat() {
  const i = document.getElementById('chatMsg');
  const msg = i.value.trim();
  if (!msg) return;
  socket.emit('chat', { msg });
  i.value = '';
}

function appendChat(data) {
  const c = document.getElementById('chatMessages');
  const d = document.createElement('div');
  d.className = 'cmsg';
  
  if (data.system) {
    d.classList.add('sys');
    d.innerHTML = `<span class="sys-txt"><i class="fas fa-circle-info"></i> ${data.msg}</span>`;
  } else {
    const me = data.pid === myId;
    if (me) d.classList.add('me');
    const init = data.name.charAt(0).toUpperCase();
    
    d.innerHTML = `
      <div class="cmsg-av" style="background:${data.color}">${init}</div>
      <div class="cmsg-bub">
        ${!me ? `<div class="cmsg-name" style="color:${data.color}">${data.name}</div>` : ''}
        ${data.msg}
      </div>`;
  }
  
  c.appendChild(d);
  if (chatOpen) c.scrollTop = c.scrollHeight;
}

function updateUnread() {
  const btn = document.getElementById('chatBtn');
  let b = btn.querySelector('.unread-dot');
  
  if (unread > 0) {
    if (!b) {
      b = document.createElement('div');
      b.className = 'unread-dot';
      btn.appendChild(b);
    }
    b.textContent = unread > 9 ? '9+' : unread;
  } else {
    if (b) b.remove();
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   SHEETS
══════════════════════════════════════════════════════════════════════════ */
function openSheet(id) {
  document.getElementById(id).classList.add('show');
}

function closeSheet(id) {
  document.getElementById(id).classList.remove('show');
  if (id === 'chatOverlay') {
    chatOpen = false;
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   WIN
══════════════════════════════════════════════════════════════════════════ */
function showWin(winner, winnerName, scores) {
  document.getElementById('winOverlay').classList.add('show');
  document.getElementById('winMsg').textContent =
    winner === myId ? '🎉 Tebrikler, kazandınız!' : `${winnerName} kazandı!`;
  
  const sc = document.getElementById('winScores');
  sc.innerHTML = '';
  
  if (roomState) {
    const sorted = [...roomState.order].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
    sorted.forEach(pid => {
      const p = roomState.players[pid];
      if (!p) return;
      
      const r = document.createElement('div');
      r.className = 'wrow';
      r.innerHTML = `
        <span class="wname">${p.name}${pid === myId ? ' (Sen)' : ''}</span>
        <span class="wval">${scores[pid] || 0} puan</span>`;
      sc.appendChild(r);
    });
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   NOTIFY
══════════════════════════════════════════════════════════════════════════ */
function notify(msg, type = 'info') {
  const s = document.getElementById('notifs');
  const el = document.createElement('div');
  el.className = `notif ${type}`;
  el.innerHTML = msg;
  s.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ══════════════════════════════════════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════════════════════════════════════ */
function spawnConfetti() {
  const cols = ['#e63946', '#ffd60a', '#06ffa5', '#3a86ff', '#ff9800', '#e91e63', '#9c27b0'];
  for (let i = 0; i < 100; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = cols[Math.floor(Math.random() * cols.length)];
    el.style.animationDuration = (2 + Math.random() * 2.5) + 's';
    el.style.animationDelay = (Math.random() * .6) + 's';
    el.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.activeElement.id === 'chatMsg') sendChat();
    if (document.activeElement.id === 'nameInput' || document.activeElement.id === 'roomInput') joinGame();
  }
  if (e.key === 'Escape') {
    ['colorOverlay', 'playersOverlay', 'chatOverlay'].forEach(closeSheet);
    selectedCardId = pendingWildId = null;
    renderHand();
  }
});
</script>
